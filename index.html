<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Jae 🎂</title>
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Cinzel:wght@700&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background: radial-gradient(ellipse at 50% 30%, #0a1628 0%, #050d1a 60%, #020810 100%);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  font-family: 'Cinzel', serif;
}
#fireworksCanvas {
  position: fixed; inset: 0;
  pointer-events: none;
  z-index: 0;
  width: 100%; height: 100%;
}
.title {
  font-family: 'Great Vibes', cursive;
  font-size: clamp(2.6rem, 8vw, 4.5rem);
  color: #e8d5a3;
  text-shadow: 0 0 30px rgba(255,215,0,0.6), 0 0 60px rgba(255,180,0,0.3);
  z-index: 10;
  animation: titleIn 1.4s cubic-bezier(.22,1,.36,1) forwards;
  opacity: 0;
  letter-spacing: 3px;
  text-align: center;
}
@keyframes titleIn {
  from { opacity:0; transform: translateY(-30px) scale(.88); }
  to   { opacity:1; transform: translateY(0) scale(1); }
}
.scene {
  z-index: 10;
  animation: sceneIn 1.3s .5s cubic-bezier(.22,1,.36,1) forwards;
  opacity: 0;
  filter: drop-shadow(0 20px 60px rgba(30,80,180,0.5));
  margin: 8px 0;
}
@keyframes sceneIn {
  from { opacity:0; transform: translateY(50px) scale(.9); }
  to   { opacity:1; transform: translateY(0) scale(1); }
}
canvas#cake {
  display: block;
  width: min(500px, 95vw);
  height: auto;
}
.subtitle {
  font-size: .78rem;
  color: #8ab4d8;
  letter-spacing: 5px;
  text-transform: uppercase;
  z-index: 10;
  animation: sceneIn 1s 1.4s ease forwards;
  opacity: 0;
  text-align: center;
}
/* floating silver balls */
.ball {
  position: fixed;
  border-radius: 50%;
  pointer-events: none;
  z-index: 2;
  animation: ballFloat var(--bd) var(--bdelay) ease-in-out infinite alternate;
}
@keyframes ballFloat {
  from { transform: translateY(0) scale(1); }
  to   { transform: translateY(-18px) scale(1.05); }
}
</style>
</head>
<body>

<canvas id="fireworksCanvas"></canvas>

<p class="title">✨ Happy Birthday Jae ✨</p>

<div class="scene">
  <canvas id="cake" width="500" height="480"></canvas>
</div>

<p class="subtitle">🎆 With all the stars in the sky 🎆</p>

<script>
/* ══════════════════════════════════
   FIREWORKS
══════════════════════════════════ */
const fwCanvas = document.getElementById('fireworksCanvas');
const fwCtx = fwCanvas.getContext('2d');
fwCanvas.width = window.innerWidth;
fwCanvas.height = window.innerHeight;
window.addEventListener('resize', () => {
  fwCanvas.width = window.innerWidth;
  fwCanvas.height = window.innerHeight;
});

class Particle {
  constructor(x, y, color) {
    this.x = x; this.y = y;
    this.color = color;
    const angle = Math.random() * Math.PI * 2;
    const speed = Math.random() * 5 + 1.5;
    this.vx = Math.cos(angle) * speed;
    this.vy = Math.sin(angle) * speed;
    this.life = 1;
    this.decay = Math.random() * 0.018 + 0.012;
    this.size = Math.random() * 3 + 1.5;
    this.gravity = 0.08;
    this.trail = [];
  }
  update() {
    this.trail.push({x: this.x, y: this.y});
    if (this.trail.length > 6) this.trail.shift();
    this.vy += this.gravity;
    this.x += this.vx;
    this.y += this.vy;
    this.vx *= 0.97;
    this.vy *= 0.97;
    this.life -= this.decay;
  }
  draw(ctx) {
    // trail
    for (let i = 0; i < this.trail.length; i++) {
      const t = i / this.trail.length;
      ctx.beginPath();
      ctx.arc(this.trail[i].x, this.trail[i].y, this.size * t * 0.6, 0, Math.PI*2);
      ctx.fillStyle = this.color.replace('1)', `${t * this.life * 0.4})`);
      ctx.fill();
    }
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size, 0, Math.PI*2);
    ctx.fillStyle = this.color.replace('1)', `${this.life})`);
    ctx.shadowColor = this.color;
    ctx.shadowBlur = 8;
    ctx.fill();
    ctx.shadowBlur = 0;
  }
}

class Firework {
  constructor() { this.reset(); }
  reset() {
    this.x = Math.random() * fwCanvas.width;
    this.y = fwCanvas.height;
    this.tx = fwCanvas.width * 0.15 + Math.random() * fwCanvas.width * 0.7;
    this.ty = fwCanvas.height * 0.1 + Math.random() * fwCanvas.height * 0.45;
    this.speed = Math.random() * 4 + 8;
    const dx = this.tx - this.x, dy = this.ty - this.y;
    const dist = Math.sqrt(dx*dx+dy*dy);
    this.vx = dx/dist*this.speed;
    this.vy = dy/dist*this.speed;
    this.exploded = false;
    this.particles = [];
    this.trail = [];
    const hues = [200, 220, 30, 350, 280, 180, 60];
    this.hue = hues[Math.floor(Math.random()*hues.length)];
  }
  update() {
    if (!this.exploded) {
      this.trail.push({x:this.x,y:this.y});
      if (this.trail.length>12) this.trail.shift();
      this.x += this.vx; this.y += this.vy;
      if (Math.abs(this.x-this.tx)<8 && Math.abs(this.y-this.ty)<8) {
        this.exploded = true;
        this.explode();
      }
    } else {
      this.particles.forEach(p => p.update());
      this.particles = this.particles.filter(p => p.life > 0);
    }
  }
  explode() {
    const count = 120 + Math.floor(Math.random()*60);
    for (let i=0;i<count;i++) {
      const h = this.hue + (Math.random()-0.5)*40;
      const s = 80 + Math.random()*20;
      const l = 55 + Math.random()*30;
      this.particles.push(new Particle(this.tx, this.ty, `hsla(${h},${s}%,${l}%,1)`));
    }
    // star burst extra
    for (let i=0;i<20;i++) {
      const p = new Particle(this.tx, this.ty, `hsla(50,100%,90%,1)`);
      p.vx *= 1.8; p.vy *= 1.8; p.size = 2;
      this.particles.push(p);
    }
  }
  draw(ctx) {
    if (!this.exploded) {
      for (let i=0;i<this.trail.length;i++) {
        const t = i/this.trail.length;
        ctx.beginPath();
        ctx.arc(this.trail[i].x, this.trail[i].y, 2*t, 0, Math.PI*2);
        ctx.fillStyle = `hsla(${this.hue},80%,70%,${t*0.8})`;
        ctx.fill();
      }
      ctx.beginPath();
      ctx.arc(this.x, this.y, 3, 0, Math.PI*2);
      ctx.fillStyle = `hsl(${this.hue},90%,85%)`;
      ctx.shadowColor = `hsl(${this.hue},90%,70%)`;
      ctx.shadowBlur = 10;
      ctx.fill();
      ctx.shadowBlur = 0;
    } else {
      this.particles.forEach(p => p.draw(ctx));
    }
  }
  isDone() { return this.exploded && this.particles.length === 0; }
}

const fireworks = [];
let fwTick = 0;
function animFireworks() {
  fwCtx.fillStyle = 'rgba(2,8,16,0.22)';
  fwCtx.fillRect(0,0,fwCanvas.width,fwCanvas.height);
  fwTick++;
  if (fwTick % 38 === 0) fireworks.push(new Firework());
  fireworks.forEach(f => { f.update(); f.draw(fwCtx); });
  for (let i = fireworks.length-1; i>=0; i--) {
    if (fireworks[i].isDone()) { fireworks[i].reset(); }
  }
  requestAnimationFrame(animFireworks);
}
// launch first batch
for (let i=0;i<4;i++) {
  setTimeout(() => fireworks.push(new Firework()), i*300);
}
animFireworks();

/* ══════════════════════════════════
   CAKE CANVAS
══════════════════════════════════ */
const cake = document.getElementById('cake');
const ctx = cake.getContext('2d');
const W = 500, H = 480;
let t = 0;

function roundRect(cx, x, y, w, h, r) {
  cx.beginPath();
  cx.moveTo(x+r,y);
  cx.lineTo(x+w-r,y); cx.quadraticCurveTo(x+w,y,x+w,y+r);
  cx.lineTo(x+w,y+h-r); cx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  cx.lineTo(x+r,y+h); cx.quadraticCurveTo(x,y+h,x,y+h-r);
  cx.lineTo(x,y+r); cx.quadraticCurveTo(x,y,x+r,y);
  cx.closePath();
}

function drawFlame(cx, x, y, idx) {
  const flicker = 0.82 + Math.sin(t*0.14+idx*1.5)*0.18;
  const sw = 0.88 + Math.sin(t*0.19+idx)*0.12;
  cx.save(); cx.translate(x,y); cx.scale(sw, flicker);
  const og = cx.createRadialGradient(0,0,1,0,-10,14);
  og.addColorStop(0,'rgba(255,220,80,0.5)'); og.addColorStop(1,'transparent');
  cx.fillStyle=og; cx.beginPath(); cx.ellipse(0,-7,11,15,0,0,Math.PI*2); cx.fill();
  const fg = cx.createRadialGradient(0,-3,1,0,-11,13);
  fg.addColorStop(0,'#fff');
  fg.addColorStop(0.3,'#ffe566');
  fg.addColorStop(0.65,'#ff8c00');
  fg.addColorStop(1,'rgba(255,40,0,0)');
  cx.fillStyle=fg;
  cx.beginPath(); cx.moveTo(0,0);
  cx.bezierCurveTo(-5,-6,-5,-15,0,-22);
  cx.bezierCurveTo(5,-15,5,-6,0,0);
  cx.fill(); cx.restore();
}

function drawStar(cx, x, y, r, col) {
  const pulse = 1+Math.sin(t*0.08)*0.13;
  cx.save(); cx.translate(x,y); cx.scale(pulse,pulse);
  cx.beginPath();
  for(let i=0;i<10;i++){
    const a=i*Math.PI/5-Math.PI/2;
    const ri=i%2===0?r:r*0.42;
    i===0?cx.moveTo(Math.cos(a)*ri,Math.sin(a)*ri):cx.lineTo(Math.cos(a)*ri,Math.sin(a)*ri);
  }
  cx.closePath();
  cx.fillStyle=col; cx.shadowColor=col; cx.shadowBlur=20; cx.fill(); cx.shadowBlur=0;
  cx.restore();
}

function drawSilverBall(cx, x, y, r) {
  const pulse = 1+Math.sin(t*0.06+x*0.05)*0.1;
  const rr = r*pulse;
  const g = cx.createRadialGradient(x-rr*0.35, y-rr*0.35, rr*0.05, x, y, rr);
  g.addColorStop(0,'#ffffff');
  g.addColorStop(0.25,'#d8e8f8');
  g.addColorStop(0.6,'#8aafc8');
  g.addColorStop(1,'#3a6080');
  cx.beginPath(); cx.arc(x,y,rr,0,Math.PI*2);
  cx.fillStyle=g; cx.shadowColor='rgba(180,220,255,0.8)'; cx.shadowBlur=14; cx.fill(); cx.shadowBlur=0;
  // highlight
  cx.beginPath(); cx.arc(x-rr*0.28, y-rr*0.3, rr*0.22, 0, Math.PI*2);
  cx.fillStyle='rgba(255,255,255,0.75)'; cx.fill();
}

function drawDrip(cx, x, y, len, col) {
  cx.fillStyle=col;
  cx.beginPath();
  cx.moveTo(x-4,y);
  cx.quadraticCurveTo(x-4,y+len*0.6,x,y+len);
  cx.quadraticCurveTo(x+4,y+len*0.6,x+4,y);
  cx.closePath(); cx.fill();
  cx.beginPath(); cx.arc(x,y+len,4.5,0,Math.PI*2); cx.fill();
}

function drawCreamDot(cx, x, y, r, col) {
  cx.beginPath(); cx.arc(x,y,r,0,Math.PI*2);
  cx.fillStyle=col; cx.fill();
}

function drawBlueFlower(cx, x, y, r) {
  // white petal flower
  for(let i=0;i<6;i++){
    const a=i*Math.PI/3;
    cx.beginPath();
    cx.ellipse(x+Math.cos(a)*r*0.6, y+Math.sin(a)*r*0.6, r*0.5, r*0.28, a, 0, Math.PI*2);
    cx.fillStyle='rgba(255,255,255,0.92)'; cx.fill();
  }
  cx.beginPath(); cx.arc(x,y,r*0.3,0,Math.PI*2);
  cx.fillStyle='#1a3a6a'; cx.fill();
}

function drawStar5(cx, x, y, r, col) {
  cx.save(); cx.translate(x,y);
  cx.beginPath();
  for(let i=0;i<10;i++){
    const a=i*Math.PI/5-Math.PI/2;
    const ri=i%2===0?r:r*0.4;
    i===0?cx.moveTo(Math.cos(a)*ri,Math.sin(a)*ri):cx.lineTo(Math.cos(a)*ri,Math.sin(a)*ri);
  }
  cx.closePath(); cx.fillStyle=col;
  cx.shadowColor=col; cx.shadowBlur=10; cx.fill(); cx.shadowBlur=0;
  cx.restore();
}

// blue leaf/petal shapes
function drawBluePetal(cx, x, y, w, h, angle, col) {
  cx.save(); cx.translate(x,y); cx.rotate(angle);
  cx.beginPath();
  cx.moveTo(0, -h/2);
  cx.bezierCurveTo(w/2,-h/3, w/2, h/3, 0, h/2);
  cx.bezierCurveTo(-w/2,h/3,-w/2,-h/3,0,-h/2);
  cx.closePath();
  cx.fillStyle=col; cx.fill();
  cx.restore();
}

function drawCake() {
  ctx.clearRect(0,0,W,H);

  // ── Ground shadow ──
  const gs = ctx.createRadialGradient(250,460,5,250,460,140);
  gs.addColorStop(0,'rgba(30,80,180,0.25)'); gs.addColorStop(1,'transparent');
  ctx.fillStyle=gs; ctx.beginPath(); ctx.ellipse(250,462,135,18,0,0,Math.PI*2); ctx.fill();

  // ── PLATE ──
  const plG = ctx.createLinearGradient(100,440,400,460);
  plG.addColorStop(0,'#c8d8e8'); plG.addColorStop(0.5,'#f0f5fa'); plG.addColorStop(1,'#a8c0d8');
  ctx.beginPath(); ctx.ellipse(250,448,148,20,0,0,Math.PI*2);
  ctx.fillStyle=plG; ctx.fill();
  ctx.strokeStyle='#8aafc8'; ctx.lineWidth=1.5; ctx.stroke();
  ctx.beginPath(); ctx.ellipse(250,448,108,13,0,0,Math.PI*2);
  ctx.strokeStyle='rgba(200,220,240,0.6)'; ctx.lineWidth=1; ctx.stroke();

  // ═══ BOTTOM TIER ═══
  // blue bottom
  roundRect(ctx,88,315,325,130,10);
  const bg3 = ctx.createLinearGradient(88,315,418,445);
  bg3.addColorStop(0,'#1a3a7a'); bg3.addColorStop(0.35,'#2255a8'); bg3.addColorStop(0.65,'#1e4d99'); bg3.addColorStop(1,'#122d60');
  ctx.fillStyle=bg3; ctx.fill();
  // shine left
  roundRect(ctx,88,315,325,130,10);
  const shine3 = ctx.createLinearGradient(88,0,220,0);
  shine3.addColorStop(0,'rgba(255,255,255,0.12)'); shine3.addColorStop(1,'transparent');
  ctx.fillStyle=shine3; ctx.fill();
  // top ellipse
  ctx.beginPath(); ctx.ellipse(253,315,168,22,0,0,Math.PI*2);
  const te3=ctx.createLinearGradient(88,293,418,337);
  te3.addColorStop(0,'#1e4d99'); te3.addColorStop(0.5,'#3068c8'); te3.addColorStop(1,'#152e6a');
  ctx.fillStyle=te3; ctx.fill(); ctx.strokeStyle='#4478cc'; ctx.lineWidth=1; ctx.stroke();

  // white cream band top of bottom tier
  ctx.beginPath(); ctx.ellipse(253,315,168,22,0,0,Math.PI*2);
  ctx.strokeStyle='rgba(255,255,255,0.7)'; ctx.lineWidth=3; ctx.stroke();

  // white drips bottom tier
  [95,122,150,178,205,232,260,288,315,342,368,395].forEach((dx,i)=>{
    drawDrip(ctx, dx, 443, 16+Math.sin(i*1.8)*7, 'rgba(255,255,255,0.85)');
  });
  // silver drip accent
  [108,165,222,278,335,390].forEach((dx,i)=>{
    drawDrip(ctx, dx, 443, 22+Math.sin(i*2)*6, 'rgba(180,210,240,0.7)');
  });

  // cream dots row bottom tier
  for(let i=0;i<13;i++){
    drawCreamDot(ctx, 98+i*25, 440, 5, 'rgba(255,255,255,0.8)');
  }

  // blue petals decoration bottom tier
  [110,175,245,315,380].forEach((px,i)=>{
    drawBluePetal(ctx, px, 378, 28, 48, i*0.4, i%2===0?'#1a3a7a':'#0e2552');
    drawBluePetal(ctx, px+12, 375, 22, 38, -i*0.3+0.5, 'rgba(30,70,160,0.5)');
  });
  // white flowers bottom tier
  [130,215,290,370].forEach((px,i)=>{
    drawBlueFlower(ctx, px, 370, 12);
  });

  // silver star accents bottom
  [108,200,300,395].forEach((px,i)=>{
    drawStar5(ctx, px, 355, 8, `hsla(${200+i*15},60%,75%,0.9)`);
  });

  // ═══ MIDDLE TIER ═══
  roundRect(ctx,135,210,235,110,9);
  const bg2=ctx.createLinearGradient(135,210,375,320);
  bg2.addColorStop(0,'#f5f8ff'); bg2.addColorStop(0.4,'#ffffff'); bg2.addColorStop(1,'#e8f0fa');
  ctx.fillStyle=bg2; ctx.fill();
  // left shade
  roundRect(ctx,135,210,235,110,9);
  const sh2=ctx.createLinearGradient(135,0,260,0);
  sh2.addColorStop(0,'rgba(30,70,160,0.1)'); sh2.addColorStop(0.4,'transparent'); sh2.addColorStop(1,'rgba(30,70,160,0.1)');
  ctx.fillStyle=sh2; ctx.fill();

  ctx.beginPath(); ctx.ellipse(255,210,122,17,0,0,Math.PI*2);
  const te2=ctx.createLinearGradient(135,193,375,227);
  te2.addColorStop(0,'#d0ddf5'); te2.addColorStop(0.5,'#f0f5ff'); te2.addColorStop(1,'#b0c8e8');
  ctx.fillStyle=te2; ctx.fill(); ctx.strokeStyle='#8aafc8'; ctx.lineWidth=1; ctx.stroke();

  // white drips mid
  [138,162,186,210,234,258,282,306,330,355,372].forEach((dx,i)=>{
    drawDrip(ctx, dx, 319, 14+Math.sin(i*2)*6, 'rgba(200,220,255,0.9)');
  });
  // cream dots row mid
  for(let i=0;i<9;i++){
    drawCreamDot(ctx, 145+i*27, 317, 5, 'rgba(180,210,250,0.9)');
  }

  // blue band stripe on white tier
  ctx.fillStyle='rgba(26,58,122,0.12)';
  ctx.fillRect(135,250,240,14);
  ctx.fillRect(135,278,240,10);

  // blue petal accents mid
  [148,210,270,330,362].forEach((px,i)=>{
    drawBluePetal(ctx, px, 265, 22,40, i*0.5, i%2===0?'rgba(26,58,122,0.7)':'rgba(18,40,100,0.5)');
  });
  [162,240,320,355].forEach((px,i)=>{
    drawBlueFlower(ctx, px, 260, 10);
  });

  // ═══ TOP TIER ═══
  roundRect(ctx,175,108,160,106,8);
  const bg1=ctx.createLinearGradient(175,108,340,214);
  bg1.addColorStop(0,'#1a3a7a'); bg1.addColorStop(0.4,'#2458b0'); bg1.addColorStop(1,'#122d60');
  ctx.fillStyle=bg1; ctx.fill();
  const sh1=ctx.createLinearGradient(175,0,280,0);
  sh1.addColorStop(0,'rgba(255,255,255,0.1)'); sh1.addColorStop(1,'transparent');
  roundRect(ctx,175,108,160,106,8); ctx.fillStyle=sh1; ctx.fill();

  ctx.beginPath(); ctx.ellipse(255,108,84,14,0,0,Math.PI*2);
  const te1=ctx.createLinearGradient(175,94,335,122);
  te1.addColorStop(0,'#1e4d99'); te1.addColorStop(0.5,'#3068c8'); te1.addColorStop(1,'#152e6a');
  ctx.fillStyle=te1; ctx.fill(); ctx.strokeStyle='#4478cc'; ctx.lineWidth=1; ctx.stroke();

  // white cream ring top tier
  ctx.beginPath(); ctx.ellipse(255,108,84,14,0,0,Math.PI*2);
  ctx.strokeStyle='rgba(255,255,255,0.7)'; ctx.lineWidth=2.5; ctx.stroke();

  // drips top tier
  [178,198,218,238,258,278,298,318,333].forEach((dx,i)=>{
    drawDrip(ctx, dx, 213, 12+Math.sin(i*2.2)*5, 'rgba(255,255,255,0.8)');
  });
  // cream dots top
  for(let i=0;i<7;i++){
    drawCreamDot(ctx, 182+i*25, 211, 4.5, 'rgba(255,255,255,0.75)');
  }

  // blue petals top tier
  [182,218,255,292,328].forEach((px,i)=>{
    drawBluePetal(ctx, px, 160, 20,36, i*0.6, i%2===0?'#1a3a7a':'#0e2552');
  });

  // ── Happy Birthday Jae inscription ──
  ctx.save();
  // gold topper disc bg
  ctx.beginPath(); ctx.ellipse(255,82,52,12,0,0,Math.PI*2);
  const discG=ctx.createRadialGradient(255,78,5,255,82,52);
  discG.addColorStop(0,'#ffe566'); discG.addColorStop(0.5,'#ffc200'); discG.addColorStop(1,'#b8860b');
  ctx.fillStyle=discG; ctx.fill();
  ctx.strokeStyle='#ffd700'; ctx.lineWidth=2; ctx.stroke();

  // text on cake body
  ctx.font = "bold 14px 'Great Vibes', cursive";
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.shadowColor='rgba(255,220,100,0.8)'; ctx.shadowBlur=16;
  ctx.fillStyle='#ffd700';
  ctx.fillText('Happy Birthday Jae', 255, 160);
  ctx.shadowBlur=0;
  ctx.fillStyle='#fff8dc';
  ctx.fillText('Happy Birthday Jae', 255, 160);

  // topper text
  ctx.font="bold 10px 'Great Vibes', cursive";
  ctx.fillStyle='#1a3a7a'; ctx.shadowBlur=0;
  ctx.fillText('Happy Birthday', 255, 81);
  ctx.restore();

  // ── Silver balls (top tier) ──
  const ballPos = [
    {x:192,y:98,r:11},{x:230,y:93,r:13},{x:262,y:90,r:15},
    {x:293,y:93,r:13},{x:320,y:98,r:11},{x:215,y:82,r:9},{x:300,y:82,r:9}
  ];
  ballPos.forEach(b => drawSilverBall(ctx, b.x, b.y, b.r));

  // silver balls scattered bottom tier
  [{x:105,y:308,r:14},{x:148,y:302,r:12},{x:362,y:305,r:14},{x:405,y:310,r:12}].forEach(b=>drawSilverBall(ctx,b.x,b.y,b.r));

  // ── Gold star topper ──
  drawStar(ctx, 255, 62, 22, '#ffd700');

  // small silver stars floating
  const floatStars = [
    {x:82,y:295},{x:425,y:298},{x:130,y:200},{x:375,y:195},
    {x:95,y:380},{x:415,y:378},{x:160,y:110},{x:350,y:108}
  ];
  floatStars.forEach((s,i)=>{
    const pulse=0.7+Math.sin(t*0.07+i*0.9)*0.3;
    drawStar5(ctx, s.x, s.y, 9*pulse, `hsla(${210+i*8},60%,80%,${pulse})`);
  });

  // ── Candles ──
  const candlePos=[
    {x:205,y:108,col:'#4a90d9',stripe:'#2255a8'},
    {x:240,y:105,col:'#f0f5ff',stripe:'#c8d8f0'},
    {x:272,y:104,col:'#ffd700',stripe:'#ffa000'},
    {x:305,y:108,col:'#4a90d9',stripe:'#2255a8'},
  ];
  candlePos.forEach((cd,i)=>{
    ctx.fillStyle=cd.col;
    roundRect(ctx,cd.x-5,cd.y-50,10,44,3); ctx.fill();
    ctx.fillStyle=cd.stripe; ctx.globalAlpha=0.35;
    for(let s=0;s<3;s++) ctx.fillRect(cd.x-5,cd.y-50+s*14,10,6);
    ctx.globalAlpha=1;
    // wick
    ctx.strokeStyle='#333'; ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.moveTo(cd.x,cd.y-50); ctx.lineTo(cd.x+1,cd.y-54); ctx.stroke();
    drawFlame(ctx, cd.x+1, cd.y-53, i);
  });

  t++;
  requestAnimationFrame(drawCake);
}
drawCake();
</script>
